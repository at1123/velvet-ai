
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet — Private Messaging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCn1FQYuPg4nQ8XDJQ9-u7BH5Ko-vnreao",
    authDomain: "velvet-chat-5640e.firebaseapp.com",
    projectId: "velvet-chat-5640e",
    storageBucket: "velvet-chat-5640e.firebasestorage.app",
    messagingSenderId: "780143004199",
    appId: "1:780143004199:web:7af5cd1cc5b25747bc5c02"
  };
  const ADMIN_EMAIL = "ahnaftahsin99@gmail.com";
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0d10; --surface:#111418; --surface2:#181c22; --border:#1f2530; --border2:#2a3140;
    --gold:#c9a84c; --gold2:#e8c76d; --gold-dim:rgba(201,168,76,.12); --gold-glow:rgba(201,168,76,.25);
    --text:#e8e4db; --text2:#8a8f9a; --text3:#555d6b; --danger:#c0392b;
    --bubble-me:linear-gradient(135deg,#c9a84c,#e8c76d); --bubble-them:#1a1f2a;
    --shadow:0 8px 40px rgba(0,0,0,.6);
    --font-display:'Cormorant Garamond',Georgia,serif; --font-ui:'DM Sans',system-ui,sans-serif;
    --transition:.25s cubic-bezier(.4,0,.2,1);
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .hidden{display:none!important}

  #app-loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity .5s}
  #app-loader .logo{font-family:var(--font-display);font-size:3rem;color:var(--gold);letter-spacing:.12em}
  #app-loader .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #auth-screen{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(201,168,76,.07),transparent);position:relative;overflow:hidden}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:min(440px,95vw);position:relative;z-index:1;box-shadow:var(--shadow)}
  .auth-logo{font-family:var(--font-display);font-size:2.4rem;color:var(--gold);letter-spacing:.12em;text-align:center;margin-bottom:6px}
  .auth-tagline{text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:36px}
  .auth-tabs{display:flex;margin-bottom:32px;border-bottom:1px solid var(--border)}
  .auth-tab{flex:1;padding:10px;text-align:center;font-size:.9rem;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition)}
  .auth-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
  .field label{font-size:.78rem;font-weight:500;color:var(--text2);text-transform:uppercase}
  .field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);outline:none;transition:var(--transition)}
  .field input:focus{border-color:var(--gold)}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:var(--transition);font-family:inherit}
  .btn-primary{background:linear-gradient(135deg,#c9a84c,#e8c76d);color:#0a0d10}

  #pending-screen{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
  .pending-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:50px;max-width:400px}

  #chat-screen{height:100vh;display:flex;flex-direction:column}
  .topnav{display:flex;align-items:center;padding:0 20px;height:60px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-shrink:0}
  .topnav-logo{font-family:var(--font-display);font-size:1.6rem;color:var(--gold);letter-spacing:.1em}
  .topnav-spacer{flex:1}
  .topnav-user{display:flex;align-items:center;gap:10px;cursor:pointer}
  .topnav-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold-dim);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;color:var(--gold);font-weight:bold}
  
  .chat-body{display:flex;flex:1;overflow:hidden}
  .sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
  .search-box{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;gap:8px}
  .search-box input{background:none;border:none;outline:none;color:var(--text);font-size:.88rem;flex:1}
  .conv-list{flex:1;overflow-y:auto;padding:8px}
  .conv-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:12px;cursor:pointer;transition:var(--transition);margin-bottom:4px}
  .conv-item:hover{background:var(--surface2)}
  .conv-item.active{background:var(--gold-dim);border:1px solid rgba(201,168,76,0.2)}
  .conv-avatar{width:40px;height:40px;border-radius:50%;background-size:cover;background-position:center;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--gold)}
  
  .chat-main{flex:1;display:flex;flex-direction:column;background:var(--bg);position:relative}
  .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px}
  .bubble{max-width:75%;padding:10px 16px;border-radius:18px;font-size:.95rem;line-height:1.4;word-wrap:break-word}
  .bubble.me{align-self:flex-end;background:var(--bubble-me);color:#0a0d10;border-bottom-right-radius:4px}
  .bubble.them{align-self:flex-start;background:var(--bubble-them);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
  
  .chat-input-area{padding:16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
  .msg-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);outline:none;font-family:inherit}
  
  #admin-screen{height:100vh;overflow-y:auto;padding:40px;background:var(--bg)}
  .admin-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
  
  .verified-badge { color: #1da1f2; margin-left: 4px; font-size: 0.9em; }
  .flag-badge { margin-left: 4px; }
  @media(max-width:640px){ .sidebar{width:100%} .chat-main{display:none} .chat-main.mobile-active{display:flex;position:fixed;inset:0;z-index:100} }
</style>
</head>
<body>

<div id="app-loader">
  <div class="logo">✦ VELVET</div>
  <div class="spinner"></div>
</div>

<div id="auth-screen" class="hidden">
  <div class="auth-card">
    <div class="auth-logo">✦ VELVET</div>
    <div class="auth-tagline">Private Messaging System</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Request Access</div>
    </div>
    <div id="form-login">
      <div class="field"><label>Email</label><input type="email" id="login-email"></div>
      <div class="field"><label>Password</label><input type="password" id="login-password"></div>
      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>
    <div id="form-register" class="hidden">
      <div class="field"><label>Full Name</label><input type="text" id="reg-name"></div>
      <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="@username"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email"></div>
      <div class="field"><label>Password</label><input type="password" id="reg-password"></div>
      <button class="btn btn-primary" id="register-btn" onclick="handleRegister()">Request Access</button>
    </div>
  </div>
</div>

<div id="pending-screen" class="hidden">
  <div class="pending-card">
    <div class="pending-icon">⏳</div>
    <h2>Awaiting Approval</h2>
    <p style="color:var(--text2); margin-top:10px">Your account is being reviewed by the admin.</p>
    <button class="btn" style="margin-top:20px; color:var(--gold)" onclick="handleLogout()">Sign Out</button>
  </div>
</div>

<div id="admin-screen" class="hidden">
    <h1 style="margin-bottom:20px; font-family:var(--font-display); color:var(--gold)">Admin Panel</h1>
    <div id="admin-list"></div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="showScreen('chat')">Back to Chat</button>
</div>

<div id="chat-screen" class="hidden">
  <div class="topnav">
    <div class="topnav-logo">✦ VELVET</div>
    <div class="topnav-spacer"></div>
    <button class="btn" id="admin-toggle" style="display:none; width:auto; padding:5px 12px; margin-right:10px; font-size: 0.8rem;" onclick="showScreen('admin')">ADMIN</button>
    <div class="topnav-user" onclick="changePhoto()">
      <div class="topnav-avatar" id="nav-avatar"></div>
      <div class="topnav-name" id="nav-name"></div>
    </div>
    <button class="btn" style="width:auto; padding:5px 10px; margin-left:10px" onclick="handleLogout()">🚪</button>
  </div>
  <div class="chat-body">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Find @username..." oninput="renderUserList(this.value)">
        </div>
      </div>
      <div class="conv-list" id="user-list"></div>
    </div>
    <div class="chat-main" id="chat-window">
        <div class="topnav" style="background:var(--surface2); border-bottom:1px solid var(--border)">
            <button class="btn" style="width:auto; display:none" id="back-btn" onclick="closeChat()">←</button>
            <div id="active-user-name" style="font-weight:600">Select a conversation</div>
        </div>
        <div class="messages-area" id="messages-area"></div>
        <div class="chat-input-area">
          <input type="text" class="msg-input" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
          <button class="btn btn-primary" style="width:auto; padding:0 20px" onclick="sendMessage()">Send</button>
        </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentUserDoc = null;
let activeChatId = null;
let allUsers = [];
let msgUnsubscribe = null;

function getFormattedName(name, email) {
    let html = name;
    if (email === ADMIN_EMAIL || name.toLowerCase() === "ahnaf tahsin") {
        html += ` <span class="flag-badge">🇧🇩</span><span class="verified-badge">✔</span>`;
    }
    return html;
}

auth.onAuthStateChanged(async (user) => {
  if (!user) { showScreen('auth'); hideLoader(); return; }
  
  let userSnap = await db.collection('users').doc(user.uid).get();
  let retry = 0;
  while(!userSnap.exists && retry < 10) {
      await new Promise(r => setTimeout(r, 600));
      userSnap = await db.collection('users').doc(user.uid).get();
      retry++;
  }

  if (!userSnap.exists) { auth.signOut(); return; }

  currentUser = user;
  currentUserDoc = userSnap.data();

  if (currentUserDoc.status === 'pending' && user.email !== ADMIN_EMAIL) {
    showScreen('pending');
  } else {
    setupChat();
    showScreen('chat');
    if (user.email === ADMIN_EMAIL) {
        document.getElementById('admin-toggle').style.display = 'block';
        listenAdmin();
    }
  }
  hideLoader();
});

function setupChat() {
  document.getElementById('nav-name').innerHTML = getFormattedName(currentUserDoc.name, currentUserDoc.email);
  const navAv = document.getElementById('nav-avatar');
  if (currentUserDoc.photoUrl) {
    navAv.style.backgroundImage = `url(${currentUserDoc.photoUrl})`;
    navAv.textContent = '';
  } else {
    navAv.textContent = currentUserDoc.initials;
    navAv.style.backgroundImage = 'none';
  }

  db.collection('users').where('status', '==', 'approved').onSnapshot(snap => {
    allUsers = snap.docs.map(d => d.data());
    renderUserList(document.getElementById('search-input').value);
  });
}

function renderUserList(search) {
  const list = document.getElementById('user-list');
  list.innerHTML = '';
  const query = search.toLowerCase().replace('@','').trim();
  const isAdmin = currentUser.email === ADMIN_EMAIL;
  
  allUsers.forEach(user => {
    if (user.uid === currentUser.uid) return;
    
    const isSearchMatch = query && user.username === query;
    const isTargetingAdmin = user.email === ADMIN_EMAIL; // New users can always see you
    
    if (isSearchMatch || isAdmin || isTargetingAdmin) {
        const item = document.createElement('div');
        item.className = 'conv-item' + (activeChatId && activeChatId.includes(user.uid) ? ' active' : '');
        item.onclick = () => openChat(user);
        item.innerHTML = `
          <div class="conv-avatar" style="${user.photoUrl ? `background-image:url(${user.photoUrl})` : ''}">
            ${user.photoUrl ? '' : user.initials}
          </div>
          <div class="conv-info">
            <div style="font-weight:600; font-size:0.9rem">${getFormattedName(user.name, user.email)}</div>
            <div style="font-size:0.75rem; color:var(--text3)">@${user.username}</div>
          </div>
        `;
        list.appendChild(item);
    }
  });

  if (list.innerHTML === '' && !isAdmin) {
      list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text3); font-size:0.8rem">Search a username to find people.</div>`;
  }
}

async function openChat(user) {
    if (msgUnsubscribe) msgUnsubscribe();
    
    // This ID is the same for both users because it's sorted alphabetically
    activeChatId = [currentUser.uid, user.uid].sort().join('_');
    document.getElementById('active-user-name').innerHTML = getFormattedName(user.name, user.email);
    
    if(window.innerWidth <= 640) {
        document.getElementById('chat-window').classList.add('mobile-active');
        document.getElementById('back-btn').style.display = 'block';
    }

    // Update selection highlight
    document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'));
    renderUserList(document.getElementById('search-input').value);

    // Listen for new messages in 'chats/{chatId}/messages'
    msgUnsubscribe = db.collection('chats').doc(activeChatId).collection('messages')
      .orderBy('time', 'asc')
      .onSnapshot(snap => {
        const area = document.getElementById('messages-area');
        area.innerHTML = '';
        snap.forEach(doc => {
            const m = doc.data();
            const b = document.createElement('div');
            b.className = `bubble ${m.sender === currentUser.uid ? 'me' : 'them'}`;
            b.textContent = m.text;
            area.appendChild(b);
        });
        area.scrollTop = area.scrollHeight;
    });
}

function closeChat() { document.getElementById('chat-window').classList.remove('mobile-active'); }

async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !activeChatId) return;
    
    input.value = '';
    // Writes to 'chats/{chatId}/messages'
    await db.collection('chats').doc(activeChatId).collection('messages').add({
        text: text,
        sender: currentUser.uid,
        time: firebase.firestore.FieldValue.serverTimestamp()
    });
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.toLowerCase().replace('@','').trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  if (!name || !username || !email || !pass) return alert("Fill all fields");

  setBtnLoading('register-btn', true);
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid,
      name: name,
      username: username,
      email: email,
      status: email === ADMIN_EMAIL ? 'approved' : 'pending',
      photoUrl: '',
      initials: name.charAt(0).toUpperCase()
    });
  } catch (e) { alert(e.message); setBtnLoading('register-btn', false); }
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  setBtnLoading('login-btn', true);
  try { await auth.signInWithEmailAndPassword(email, pass); } 
  catch (e) { alert(e.message); setBtnLoading('login-btn', false); }
}

function handleLogout() { auth.signOut().then(() => window.location.reload()); }

async function changePhoto() {
    const url = prompt("Enter Direct Image URL:");
    if (url) {
        await db.collection('users').doc(currentUser.uid).update({ photoUrl: url });
        window.location.reload();
    }
}

function listenAdmin() {
    db.collection('users').onSnapshot(snap => {
        const list = document.getElementById('admin-list');
        list.innerHTML = '';
        snap.forEach(doc => {
            const u = doc.data();
            if (u.email === ADMIN_EMAIL) return;
            const card = document.createElement('div');
            card.className = 'admin-card';
            card.innerHTML = `
                <div><strong>${u.name}</strong> (@${u.username})<br><small>${u.status.toUpperCase()}</small></div>
                <div>
                    ${u.status === 'pending' ? `<button class="btn btn-primary" onclick="approveUser('${u.uid}')" style="padding:5px 15px">Approve</button>` : `<button class="btn" onclick="deleteUser('${u.uid}')" style="background:#c0392b; color:white; padding:5px 15px">Remove</button>`}
                </div>`;
            list.appendChild(card);
        });
    });
}

async function approveUser(uid) { await db.collection('users').doc(uid).update({ status: 'approved' }); }
async function deleteUser(uid) { if(confirm("Remove user?")) await db.collection('users').doc(uid).delete(); }

function showScreen(id) {
  ['auth', 'pending', 'chat', 'admin'].forEach(s => {
    document.getElementById(`${s}-screen`).classList.toggle('hidden', s !== id);
  });
}

function hideLoader() {
  const loader = document.getElementById('app-loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.classList.add('hidden'), 500);
}

function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

function setBtnLoading(id, loading) {
  const b = document.getElementById(id);
  b.disabled = loading;
  b.textContent = loading ? '...' : (id.includes('login') ? 'Sign In' : 'Request Access');
}
</script>
</body>
</html>
